<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>WebAR Application</title>
    
    <!-- Load A-Frame first -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Load MindAR specifically for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      /* NEW CODE: Overlay Styles */
      .overlay-msg {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-family: sans-serif;
        font-size: 16px;
        border-radius: 8px;
        z-index: 1000;
        pointer-events: none;
        text-align: center;
        transition: opacity 0.3s;
      }
      #scan-instruction {
        top: 40%;
      }
      #audio-hint {
        bottom: 10%;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- NEW CODE: UI Overlays -->
    <div id="scan-instruction" class="overlay-msg">Point your camera at the photo</div>
    <div id="audio-hint" class="overlay-msg">Tap the video for sound</div>

    <!-- 
      mindar-image: 
        imageTargetSrc: Path to your compiled targets.mind file
        uiScanning: no (Disables the default scanning overlay)
        uiLoading: no (Disables the default loading overlay)
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
    >
      
      <a-assets>
        <!-- 
          Video Element:
          - playsinline / webkit-playsinline: Critical for iOS Safari to play the video inline instead of full screen.
          - muted: CRITICAL! Browsers block auto-playing video/audio without prior user interaction unless it's muted.
          - loop: Loops the video continuously.
        -->
        <video 
          id="ar-video" 
          src="https://res.cloudinary.com/dy23vuzlr/video/upload/v1775482243/video_3_via15z.mp4" 
          preload="auto"
          playsinline 
          webkit-playsinline 
          muted 
          loop 
          crossorigin="anonymous">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 
        Target Entity:
        targetIndex: 0 maps to the first image in your targets.mind file.
      -->
      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <!-- 
          The plane that will display the video.
          Adjust height and width to match the aspect ratio of your target image/video.
          For a 16:9 video, you might use height="0.5625" width="1"
        -->
        <a-plane 
          id="video-plane"
          src="#ar-video" 
          position="0 0 0" 
          height="1" 
          width="1" 
          rotation="0 0 0">
        </a-plane>
      </a-entity>
      
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const targetEntity = document.querySelector('#target-entity');
        const video = document.querySelector('#ar-video');

        // NEW CODE: Element references and state flags
        const scanInstruction = document.querySelector('#scan-instruction');
        const audioHint = document.querySelector('#audio-hint');
        let hasDetectedOnce = false;
        let hasTappedOnce = false;

        // When the camera detects the target image
        targetEntity.addEventListener("targetFound", () => {
          console.log("Target found!");

          // NEW CODE: Hide scan instruction
          if (scanInstruction) scanInstruction.style.display = 'none';
          
          // NEW CODE: Show audio hint on first detection if not tapped yet
          if (!hasDetectedOnce && !hasTappedOnce) {
            hasDetectedOnce = true;
            if (audioHint) audioHint.style.display = 'block';
          }

          video.play().catch(err => {
            console.error("Video playback failed:", err);
          });
        });

        // When the target image is lost from the camera view
        targetEntity.addEventListener("targetLost", () => {
          console.log("Target lost!");

          // NEW CODE: Re-show scan instruction
          if (scanInstruction) scanInstruction.style.display = 'block';

          video.pause();
        });

        // FALLBACK: To allow sound or bypass strict policies, capture the first touch/click
        // Because we start muted, playback should succeed automatically. 
        // If the user taps the screen, we can unmute it natively.

        // NEW CODE: Function to handle first tap and hide audio hint
        const handleFirstTap = () => {
          if (!hasTappedOnce) {
            hasTappedOnce = true;
            if (audioHint) audioHint.style.display = 'none';
            if (video.muted) {
              video.muted = false;
            }
          }
        };

        window.addEventListener('click', handleFirstTap, { once: true });
        window.addEventListener('touchstart', handleFirstTap, { once: true });
      });
    </script>
  </body>
</html>
