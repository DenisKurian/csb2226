<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
</style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-assets>
    <video 
      id="vid" 
      src="video.mp4" 
      loop 
      muted 
      playsinline 
      webkit-playsinline>
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-video
      src="#vid"
      width="1"
      height="1"
      position="0 0 0"
    ></a-video>
  </a-entity>

</a-scene>

<script>
const scene = document.querySelector("a-scene");
const video = document.querySelector("#vid");

window.addEventListener("load", () => {
  // Try to start automatically
  const startAR = () => {
    scene.components["mindar-image-system"].start();
  };

  startAR();

  // fallback: if browser blocks, first tap will start it
  document.body.addEventListener("click", startAR, { once: true });
});

scene.addEventListener("targetFound", () => {
  video.play();
});

scene.addEventListener("targetLost", () => {
  video.pause();
});
</script>

</body>
</html>
