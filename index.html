<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <!-- Assets -->
    <a-assets>
      <video id="vid" src="video.mp4" loop muted playsinline></video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">
      
      <!-- DEBUG BOX (remove later) -->
      <a-box color="red" depth="0.1" height="1" width="1"></a-box>

      <!-- Video -->
      <a-video
        src="#vid"
        width="1"
        height="1"
        position="0 0 0"
      ></a-video>

    </a-entity>

  </a-scene>

  <script>
    const vid = document.querySelector("#vid");

    document.querySelector("a-scene").addEventListener("targetFound", () => {
      vid.play();
    });

    document.querySelector("a-scene").addEventListener("targetLost", () => {
      vid.pause();
    });
  </script>

</body>
</html>
