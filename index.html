<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame MUST come first -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- Then MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>

  <!-- DEBUG TEXT (remove later) -->
  <h2 style="position:absolute; color:white; z-index:10;">Loading AR...</h2>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >

    <!-- Assets -->
    <a-assets>
      <video 
        id="vid" 
        src="video.mp4" 
        loop 
        muted 
        playsinline 
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- DEBUG BOX -->
      <a-box color="red" depth="0.1" height="1" width="1"></a-box>

      <!-- Video -->
      <a-video
        src="#vid"
        width="1"
        height="1"
        position="0 0 0"
      ></a-video>

    </a-entity>

  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.querySelector("#vid");
      const scene = document.querySelector("a-scene");

      scene.addEventListener("targetFound", () => {
        video.play();
      });

      scene.addEventListener("targetLost", () => {
        video.pause();
      });
    });
  </script>

</body>
</html>
